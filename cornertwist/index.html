<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corner Twist</title>
    <meta name="description" content="This website is a timer for cubing, with a graph to track your progress.">
    <link rel="icon" href="./images/roughCube.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/site-plan.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/timer.css">
</head>
<body>
    
    <header>
        <img id="logo" alt="Corner Twist logo"src="./images/roughCube.svg">
        <div id="headerObj">
            <div id="tabs">
                <a href=""><div>Timer</div></a>
                <a href="./graph"><div>Graph</div></a>
            </div>
            <div id="scramble">
                <select name="scrambleType" id="typeSelect" aria-label="Select cube type for scramble">
                    <option value="3x3">3x3</option>
                    <option value="4x4">4x4</option>
                </select>
            </div>
        </div>
        <p id="scrambleDisplay">
                U' L F2 R U' D R F' U B2 R D2 R2 D2 L' U2 B2 L' B2 R2
        </p>
        
    </header>

    <main>

        <p id="timer">
            13.65   
        </p>

        <div id="bottom">
            <div id="group">
                <label for="groupSelect">Group:</label>
                <select name="group" id="groupSelect">
                    <option value="1">1</option>
                    <option value="New">New</option>
                    <option value="Delete">Delete</option>
                </select>
            </div>

            <div id="results">
                <table>
                    <tr>
                        <th>#</th>
                        <th>Time</th>
                        <th>Ao5</th>
                        <th>Ao12</th>
                    </tr>
                    <tr>
                        <td>2233</td>
                        <td>13.65</td>
                        <td>14.73</td>
                        <td>16.12</td>
                    </tr>
                </table>
            </div>
            <img id="scrambledCube" alt="Scrambled cube image   " src="./images/placeholderCube.svg">
        </div>
    </main>

    <footer>

    </footer>
    <script src="timer.js"></script>
</body>
</html>
