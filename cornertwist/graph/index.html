<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cornertwist Graph</title>
    <link rel="icon" href="../images/roughCube.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../styles/site-plan.css">
    <link rel="stylesheet" href="../styles/standard.css">
    <link rel="stylesheet" href="../styles/graph.css">

</head>
<body>
    <header>
        <label for="groupSelect" aria-label="Select group to graph">Group</label>
        <select id="groupSelect">

        </select>
        <select id="graphType" aria-label="Select how many solves to graph">
            <option value="12">Last 12</option>
            <option value="50" selected>Last 50</option>
            <option value="100">Last 100</option>
            <option value="all">All-Time</option>
        </select>
        <div id="headerObj">
        <div id="tabs">
            <a href="../"><div>Timer</div></a>
            <a href=""><div>Graph</div></a>
        </div>
        <img id="logo" alt="Corner Twist logo" src="../images/roughCube.svg">
    </div>
    </header>

    <canvas id="canvas" width="600" height="400"></canvas>

    <footer>
        <p id="best">Best: -</p>
        <p id="worst">Worst: -</p>
        <p id="ao">Ao50: -</p>
    </footer>
    <script src="graph.js"></script>
</body>
</html>
