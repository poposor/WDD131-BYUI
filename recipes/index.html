<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <link href="recipes.css" rel="stylesheet">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A collection of delicious recipes to try at home.">
    <meta property="og:url" content="https://poposor.github.io/WDD131-BYUI/recipes/">
    <meta property="og:image" content="images/german-gooseberry-cake.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A collection of delicious recipes to try at home.">
    <meta name="twitter:image" content="images/german-gooseberry-cake.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/recipe-book.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/recipe-book.png">
                    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Goblin+One&display=swap" rel="stylesheet">
           
    <script src="recipes.js" defer></script>

</head>
<body>

    <header>
        <div id="title">
            <img src="images/recipe-book.png">
            <h1>RecipeBook</h1>
        </div>
        <div id="search">
            <input type="search" placeholder="Find a recipe">
            <img src="images/search.svg">
        </div>
        <hr>
    </header>
    
    <main>
        
    </main>

    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>        

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
    </footer>
</body>
</html>
